# ═══════════════════════════════════════
# CloudCannon Config — Must Agence
# SSG: Eleventy (11ty)
# ═══════════════════════════════════════

source: ""
output: "_site"

paths:
  uploads: "src/assets/images/uploads"

collections_config:

  pages:
    path: "pages"
    name: "Pages"
    icon: "web"
    description: "Pages du site"
    output: true
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: "Nouvelle page"
        editor: content
        schema: default
    schemas:
      default:
        path: ".cloudcannon/schemas/page.njk"

  team:
    path: ""
    name: "Équipe"
    icon: "people"
    description: "Membres de l'équipe — ajoutez, modifiez ou supprimez"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/team.json"
    _enabled_editors:
      - data

  artistes:
    path: ""
    name: "Artistes"
    icon: "mic"
    description: "Roster d'artistes — ajoutez, modifiez ou supprimez des artistes"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/artistes.json"
    _enabled_editors:
      - data

  clients:
    path: ""
    name: "Clients / Logos"
    icon: "store"
    description: "Logos des entreprises clientes — ajoutez, modifiez ou supprimez"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/clients.json"
    _enabled_editors:
      - data

  services_artiste:
    path: ""
    name: "Services Artiste"
    icon: "music_note"
    description: "Services du pôle Artiste"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/services_artiste.json"
    _enabled_editors:
      - data

  services_entreprise:
    path: ""
    name: "Services Entreprise"
    icon: "business"
    description: "Services du pôle Entreprise"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/services_entreprise.json"
    _enabled_editors:
      - data

  stats:
    path: ""
    name: "Statistiques"
    icon: "bar_chart"
    description: "Chiffres clés (home, artiste, entreprise)"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/stats.json"
    _enabled_editors:
      - data

  site_settings:
    path: ""
    name: "Paramètres du site"
    icon: "settings"
    description: "Informations générales, hero, contact, footer, vision, logos"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/site.json"
    _enabled_editors:
      - data

data_config:
  team:
    path: "_data/team.json"
  artistes:
    path: "_data/artistes.json"
  clients:
    path: "_data/clients.json"
  stats:
    path: "_data/stats.json"
  services_artiste:
    path: "_data/services_artiste.json"
  services_entreprise:
    path: "_data/services_entreprise.json"
  site:
  references_artistes:
    path: "_data/references_artistes.json"
  references_entreprises:
    path: "_data/references_entreprises.json"
  packs:
    path: "_data/packs.json"
  form_devis:
    path: "_data/form_devis.json"
    path: "_data/site.json"
  references_artistes:
    path: "_data/references_artistes.json"
  references_entreprises:
    path: "_data/references_entreprises.json"
  packs:
    path: "_data/packs.json"
  form_devis:
    path: "_data/form_devis.json"

# ═══ Input field configuration ═══

_inputs:

  # ── Artistes ──
  image:
    type: image
    label: "Photo"
    comment: "Photo de l'artiste (format portrait recommandé, ratio 3:4)"
    options:
      paths:
        uploads: "src/assets/images/artistes"

  # ── Clients ──
  logo:
    type: image
    label: "Logo"
    comment: "Logo de l'entreprise (fond transparent recommandé)"
    options:
      paths:
        uploads: "src/assets/images/clients"

  # ── Logos Must Agence ──
  logo_green:
    type: image
    label: "Logo vert (M vert fluo)"
    comment: "Logo principal — accueil et pôle entreprise"
    options:
      paths:
        uploads: "src/assets/images/logos"
  logo_white:
    type: image
    label: "Logo blanc (M blanc)"
    comment: "Logo secondaire — pôle artiste"
    options:
      paths:
        uploads: "src/assets/images/logos"

  # ── Team ──
  initials:
    type: text
    label: "Initiales"
    comment: "2-3 lettres affichées dans l'avatar (ex: MD)"
  name:
    type: text
    label: "Nom"
  role:
    type: text
    label: "Poste / Rôle"
  bio:
    type: textarea
    label: "Bio courte"
    comment: "Apparaît au hover sur la carte"

  # ── Services ──
  number:
    type: text
    label: "Numéro"
    comment: "Ex: 01, 02..."
  title:
    type: text
    label: "Titre"
  description:
    type: textarea
    label: "Description"
  chips:
    type: array
    label: "Tags / Mots-clés"
    comment: "Badges affichés sous la description"

  # ── Stats ──
  value:
    type: number
    label: "Valeur numérique"
    comment: "Chiffre animé (ex: 500)"
  suffix:
    type: text
    label: "Suffixe"
    comment: "Texte après le chiffre (ex: M+, %, x)"
  label:
    type: text
    label: "Légende"

  # ── Contact ──
  email:
    type: email
    label: "Email"
  phone:
    type: text
    label: "Téléphone"
  location:
    type: text
    label: "Localisation"
  whatsapp_url:
    type: url
    label: "Lien WhatsApp"

  # ── General ──
  tag:
    type: text
    label: "Sous-titre / Tag"
  text:
    type: textarea
    label: "Texte"
  quote:
    type: textarea
    label: "Citation"
  subtitle:
    type: textarea
    label: "Sous-titre"
  url:
    type: url
    label: "URL"
  placeholder:
    type: text
    label: "Placeholder"
  rows:
    type: number
    label: "Nombre de lignes"
  options:
    type: array
    label: "Options"
  form_options:
    type: array
    label: "Options du formulaire"
  icon:
    type: text
    label: "Icône (emoji)"
    comment: "Emoji affiché dans la miniature (ex: 🎵)"

# ═══ Structures for adding new items ═══

_structures:
  team_member:
    values:
      - label: "Nouveau membre"
        value:
          initials: ""
          name: ""
          role: ""
          bio: ""

  artiste_item:
    values:
      - label: "Nouvel artiste"
        value:
          name: ""
          image: ""

  client_item:
    values:
      - label: "Nouveau client"
        value:
          name: ""
          logo: ""

  service_item:
    values:
      - label: "Nouveau service"
        value:
          number: ""
          title: ""
          description: ""
          chips: []

  stat_item:
    values:
      - label: "Nouvelle statistique"
        value:
          value: 0
          suffix: ""
          label: ""

  expertise_item:
    values:
      - label: "Nouveau pilier"
        value:
          number: ""
          title: ""
          text: ""

  case_study:
    values:
      - label: "Nouvelle étude de cas"
        value:
          icon: "🎵"
          tag: ""
          title: ""
          description: ""
          metrics: []

  metric_item:
    values:
      - label: "Nouvelle métrique"
        value:
          value: ""
          label: ""

  social_link:
    values:
      - label: "Nouveau réseau social"
        value:
          label: ""
          url: ""

_editables:
  text:
    bold: true
    italic: true
    link: true
  block:
    bold: true
    italic: true
    link: true
    heading: true

generator:
  metadata:
    markdown: markdown-it
    markdown-it:
      html: true

  references_artistes:
    path: ""
    name: "Références Artistes"
    icon: "album"
    description: "Artistes par catégorie — photos, noms, catégories (ajout/suppression libre)"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/references_artistes.json"
    _enabled_editors:
      - data

  references_entreprises:
    path: ""
    name: "Références Entreprises"
    icon: "storefront"
    description: "Logos entreprises par catégorie (ajout/suppression libre)"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/references_entreprises.json"
    _enabled_editors:
      - data

  packs:
    path: ""
    name: "Packs Artistes"
    icon: "shopping_cart"
    description: "3 packs tarifés + offre sur-mesure (prix, features, bonus)"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/packs.json"
    _enabled_editors:
      - data

  form_devis:
    path: ""
    name: "Formulaire Devis"
    icon: "assignment"
    description: "Étapes du formulaire de devis personnalisé"
    output: false
    data: true
    filter:
      base: "none"
      include:
        - "_data/form_devis.json"
    _enabled_editors:
      - data
